# config/env.yaml

#切换环境
active_env: "test"  # 可选值: dev, test, prod

#开发测试生成环境配置
environments:
  dev:
    base_url: ""
    timeout: 10
    retry_times: 1
    debug: true  # 开发环境开启调试日志

  test:
    base_url: "http://192.168.2.226:35200/login"
    timeout: 10
    retry_times: 2
    debug: true   # 测试环境开启调试日志

  prod:
    base_url: ""
    timeout: 15
    retry_times: 3
    debug: false  # 生产环境严禁调试日志