# config/env.yaml

# 切换环境
active_env: "test"  # 可选值: dev, test, prod

# 开发测试生成环境配置
environments:       # 👈 父级
  dev:              # 👉 必须缩进 2 格 (或 4 格，但要统一)
    base_url: ""
    timeout: 10
    retry_times: 1
    debug: true

  test:             # 👉 必须缩进 2 格
    base_url: "http://192.168.2.226:35200/dsp-api/api/qiz-dp-system"
    timeout: 10
    retry_times: 2
    debug: true

  prod:             # 👉 必须缩进 2 格
    base_url: ""
    timeout: 15
    retry_times: 3
    debug: false